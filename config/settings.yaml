# SoftEdIBO Configuration

gateway:
  serial_port: "/dev/ttyUSB0"   # ESP-NOW gateway serial port
  baud_rate: 115200

# All ESP32 nodes use the same PCB design.
# Each node has: 2 motors (pumps) + 6 valves (3 chambers x 2) + 3 touch sensors.
# GPIO pin mapping is the same on every node (defined by the PCB).
node_pinout:
  chambers_per_node: 3
  # 2 shared motors (pumps): one for inflate, one for deflate/vacuum
  motor_pins:
    inflate: 25
    deflate: 26
  # 6 valves: one inflate + one deflate per chamber
  valve_pins:
    - { inflate: 27, deflate: 14 }   # chamber slot 0
    - { inflate: 12, deflate: 13 }   # chamber slot 1
    - { inflate: 15, deflate: 4 }    # chamber slot 2
  # Touch sensor GPIOs per chamber slot
  sensor_pins: [32, 33, 34]
  sensor_type: "capacitive_copper"    # or "hall_effect_magnet"

# Robots and their skins.
# A skin is a physical tactile unit with 1-3 air chambers.
# Multiple skins can share the same ESP32 if total chambers <= 3.
robots:
  turtle:
    nodes:
      # Node with one full 3-chamber skin
      - mac: "AA:BB:CC:DD:EE:01"
        skins:
          - skin_id: "turtle_skin_0"
            slots: [0, 1, 2]         # uses all 3 chamber slots

      # Node shared by two smaller skins (1 + 2 chambers = 3 total)
      - mac: "AA:BB:CC:DD:EE:02"
        skins:
          - skin_id: "turtle_skin_1"
            slots: [0]               # 1-chamber skin on slot 0
          - skin_id: "turtle_skin_2"
            slots: [1, 2]            # 2-chamber skin on slots 1-2

      # Node shared by three 1-chamber skins
      - mac: "AA:BB:CC:DD:EE:03"
        skins:
          - skin_id: "turtle_skin_3"
            slots: [0]
          - skin_id: "turtle_skin_4"
            slots: [1]
          - skin_id: "turtle_skin_5"
            slots: [2]

      - mac: "AA:BB:CC:DD:EE:04"
        skins:
          - skin_id: "turtle_skin_6"
            slots: [0, 1, 2]

      - mac: "AA:BB:CC:DD:EE:05"
        skins:
          - skin_id: "turtle_skin_7"
            slots: [0, 1, 2]

  thymios:
    - thymio_id: "thymio_1"
      node_mac: "AA:BB:CC:DD:EE:10"
      skins:
        - skin_id: "thymio_1_skin"
          slots: [0]                 # Thymio has 1 skin with 1 chamber
    - thymio_id: "thymio_2"
      node_mac: "AA:BB:CC:DD:EE:11"
      skins:
        - skin_id: "thymio_2_skin"
          slots: [0]

  tree:
    nodes:
      - mac: "AA:BB:CC:DD:EE:20"
        skins:
          - skin_id: "tree_branch_0"
            slots: [0]
          - skin_id: "tree_branch_1"
            slots: [1]
          - skin_id: "tree_branch_2"
            slots: [2]

thymio:
  host: "localhost"
  port: 8596

database:
  path: "data/softedibo.db"
