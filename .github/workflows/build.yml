name: Build

on:
  push:
    branches: [master]
    tags:     ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libfontconfig1 \
            imagemagick fuse libfuse2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject version into src/_version.py
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          REPO="${GITHUB_REPOSITORY}"
          printf '__version__ = "%s"\nGITHUB_REPO = "%s"\n' \
            "$VERSION" "$REPO" > src/_version.py

      - name: Build with PyInstaller
        run: pyinstaller softedibo.spec

      # ----------------------------------------------------------------
      # AppImage — ficheiro único, duplo-clique para abrir
      # ----------------------------------------------------------------

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool-bin

      - name: Generate app icon
        run: |
          convert -size 256x256 gradient:'#1a5276-#2980b9' \
            -font DejaVu-Sans-Bold -pointsize 32 -fill white \
            -gravity Center -annotate 0 "SoftEdIBO" softedibo.png

      - name: Create AppDir
        run: |
          mkdir -p SoftEdIBO.AppDir
          cp -r dist/SoftEdIBO/. SoftEdIBO.AppDir/

          cat > SoftEdIBO.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          exec "$APPDIR/SoftEdIBO" "$@"
          APPRUN
          chmod +x SoftEdIBO.AppDir/AppRun

          cat > SoftEdIBO.AppDir/softedibo.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=SoftEdIBO
          Comment=Soft-based robot for inclusive education
          Exec=SoftEdIBO
          Icon=softedibo
          Terminal=false
          Type=Application
          Categories=Education;Science;
          DESKTOP

          cp softedibo.png SoftEdIBO.AppDir/softedibo.png

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-bin/AppRun \
            SoftEdIBO.AppDir SoftEdIBO-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64
          path: SoftEdIBO-x86_64.AppImage
          retention-days: 30

  # -----------------------------------------------------------------------
  # On version tags (v*): create a GitHub Release with the AppImage
  # -----------------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SoftEdIBO-x86_64.AppImage
          generate_release_notes: true
          body: |
            ## Download & Abrir (Linux x86-64)

            1. Descarregar **`SoftEdIBO-x86_64.AppImage`**
            2. Tornar executável (uma única vez):
               ```bash
               chmod +x SoftEdIBO-x86_64.AppImage
               ```
            3. **Duplo-clique** — o wizard de configuração abre automaticamente.

            > **Porta série (USB):** se for a primeira vez, corre:
            > `sudo usermod -aG dialout $USER`  e faz logout/login.

            Os dados da aplicação ficam em `~/.local/share/SoftEdIBO/`.
