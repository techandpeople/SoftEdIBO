name: Build

on:
  push:
    branches: [master]
    tags:     ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libfontconfig1 \
            imagemagick libfuse2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate Qt UI Python files
        run: |
          for ui_file in src/gui/ui/*.ui; do
            base=$(basename "$ui_file" .ui)
            pyside6-uic "$ui_file" -o "src/gui/ui_${base}.py"
          done

      - name: Inject version into src/_version.py
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="nightly"
          fi
          REPO="${GITHUB_REPOSITORY}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '__version__ = "%s"\nGITHUB_REPO = "%s"\n__build_time__ = "%s"\n__commit__ = "%s"\n' \
            "$VERSION" "$REPO" "$BUILD_TIME" "${GITHUB_SHA}" > src/_version.py

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      # ----------------------------------------------------------------
      # Choose firmware build environment (release on tags, debug otherwise)
      # ----------------------------------------------------------------

      - name: Choose firmware build environment
        id: fw-env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "env=release" >> "$GITHUB_OUTPUT"
          else
            echo "env=debug" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------------------------------
      # Gateway
      # ----------------------------------------------------------------

      - name: Build gateway firmware
        run: |
          cd firmware/gateway
          python -m platformio run
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      # ----------------------------------------------------------------
      # node_pump  (3 chambers, direct GPIO valves, onboard pumps)
      # ----------------------------------------------------------------

      - name: Build node_pump firmware (${{ steps.fw-env.outputs.env }})
        run: |
          cd firmware/node_pump
          python -m platformio run -e ${{ steps.fw-env.outputs.env }}
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/${{ steps.fw-env.outputs.env }}/bootloader.bin \
            0x8000 .pio/build/${{ steps.fw-env.outputs.env }}/partitions.bin \
            0x10000 .pio/build/${{ steps.fw-env.outputs.env }}/firmware.bin

      # ----------------------------------------------------------------
      # node_multiplexed_pump  (N chambers, 74HC595 valves + 74HC4051 mux, onboard pumps)
      # ----------------------------------------------------------------

      - name: Build node_multiplexed_pump firmware (${{ steps.fw-env.outputs.env }})
        run: |
          cd firmware/node_multiplexed_pump
          python -m platformio run -e ${{ steps.fw-env.outputs.env }}
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/${{ steps.fw-env.outputs.env }}/bootloader.bin \
            0x8000 .pio/build/${{ steps.fw-env.outputs.env }}/partitions.bin \
            0x10000 .pio/build/${{ steps.fw-env.outputs.env }}/firmware.bin

      # ----------------------------------------------------------------
      # node_reservoir  (single tank, GPIO pumps, no per-chamber valves)
      # ----------------------------------------------------------------

      - name: Build node_reservoir firmware (${{ steps.fw-env.outputs.env }})
        run: |
          cd firmware/node_reservoir
          python -m platformio run -e ${{ steps.fw-env.outputs.env }}
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/${{ steps.fw-env.outputs.env }}/bootloader.bin \
            0x8000 .pio/build/${{ steps.fw-env.outputs.env }}/partitions.bin \
            0x10000 .pio/build/${{ steps.fw-env.outputs.env }}/firmware.bin

      # ----------------------------------------------------------------
      # node_multiplexed_reservoir  (N tanks, 74HC595 pump relays + 74HC4051 sensor mux)
      # ----------------------------------------------------------------

      - name: Build node_multiplexed_reservoir firmware (${{ steps.fw-env.outputs.env }})
        run: |
          cd firmware/node_multiplexed_reservoir
          python -m platformio run -e ${{ steps.fw-env.outputs.env }}
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/${{ steps.fw-env.outputs.env }}/bootloader.bin \
            0x8000 .pio/build/${{ steps.fw-env.outputs.env }}/partitions.bin \
            0x10000 .pio/build/${{ steps.fw-env.outputs.env }}/firmware.bin

      # ----------------------------------------------------------------
      # Collect all firmware binaries
      # ----------------------------------------------------------------

      - name: Collect firmware binaries
        run: |
          mkdir -p firmware-binaries
          cp firmware/gateway/firmware.bin        firmware-binaries/gateway.bin
          cp firmware/node_pump/firmware.bin                firmware-binaries/node_pump.bin
          cp firmware/node_multiplexed_pump/firmware.bin    firmware-binaries/node_multiplexed_pump.bin
          cp firmware/node_reservoir/firmware.bin           firmware-binaries/node_reservoir.bin
          cp firmware/node_multiplexed_reservoir/firmware.bin firmware-binaries/node_multiplexed_reservoir.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.fw-env.outputs.env }}
          path: firmware-binaries/
          retention-days: 30

      # ----------------------------------------------------------------
      # Python desktop application
      # ----------------------------------------------------------------

      - name: Build with PyInstaller
        run: pyinstaller softedibo.spec

      # ----------------------------------------------------------------
      # AppImage — single file, double-click to open
      # ----------------------------------------------------------------

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool-bin

      - name: Generate app icon
        run: |
          convert -size 256x256 gradient:'#1a5276-#2980b9' \
            -font DejaVu-Sans-Bold -pointsize 32 -fill white \
            -gravity Center -annotate 0 "SoftEdIBO" softedibo.png

      - name: Create AppDir
        run: |
          mkdir -p SoftEdIBO.AppDir
          cp -r dist/SoftEdIBO/. SoftEdIBO.AppDir/

          # Empty gio-modules dir prevents loading incompatible system GIO modules
          mkdir -p SoftEdIBO.AppDir/gio-modules

          cat > SoftEdIBO.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          # Prevent loading incompatible system GIO/GVfs modules
          export GIO_MODULE_DIR="$APPDIR/gio-modules"
          # Suppress atk-bridge / AT-SPI accessibility warnings
          export NO_AT_BRIDGE=1
          exec "$APPDIR/SoftEdIBO" "$@"
          APPRUN
          chmod +x SoftEdIBO.AppDir/AppRun

          cat > SoftEdIBO.AppDir/softedibo.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=SoftEdIBO
          Comment=Soft-based robot for inclusive education
          Exec=SoftEdIBO
          Icon=softedibo
          Terminal=false
          Type=Application
          Categories=Education;
          DESKTOP

          cp softedibo.png SoftEdIBO.AppDir/softedibo.png
          cp softedibo.png SoftEdIBO.AppDir/.DirIcon

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-bin/AppRun \
            SoftEdIBO.AppDir SoftEdIBO-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64
          path: SoftEdIBO-x86_64.AppImage
          retention-days: 30

  # -----------------------------------------------------------------------
  # Windows build — produces a portable zip
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate Qt UI Python files
        shell: bash
        run: |
          for ui_file in src/gui/ui/*.ui; do
            base=$(basename "$ui_file" .ui)
            pyside6-uic "$ui_file" -o "src/gui/ui_${base}.py"
          done

      - name: Inject version into src/_version.py
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="nightly"
          fi
          REPO="${GITHUB_REPOSITORY}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '__version__ = "%s"\nGITHUB_REPO = "%s"\n__build_time__ = "%s"\n__commit__ = "%s"\n' \
            "$VERSION" "$REPO" "$BUILD_TIME" "${GITHUB_SHA}" > src/_version.py

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Choose firmware build environment
        id: fw-env
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "env=release" >> "$GITHUB_OUTPUT"
          else
            echo "env=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Build gateway firmware
        shell: bash
        run: |
          cd firmware/gateway
          python -m platformio run
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      - name: Build node_pump firmware (${{ steps.fw-env.outputs.env }})
        shell: bash
        run: |
          cd firmware/node_pump
          python -m platformio run -e ${{ steps.fw-env.outputs.env }}
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/${{ steps.fw-env.outputs.env }}/bootloader.bin \
            0x8000 .pio/build/${{ steps.fw-env.outputs.env }}/partitions.bin \
            0x10000 .pio/build/${{ steps.fw-env.outputs.env }}/firmware.bin

      - name: Build node_multiplexed_pump firmware (${{ steps.fw-env.outputs.env }})
        shell: bash
        run: |
          cd firmware/node_multiplexed_pump
          python -m platformio run -e ${{ steps.fw-env.outputs.env }}
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/${{ steps.fw-env.outputs.env }}/bootloader.bin \
            0x8000 .pio/build/${{ steps.fw-env.outputs.env }}/partitions.bin \
            0x10000 .pio/build/${{ steps.fw-env.outputs.env }}/firmware.bin

      - name: Build node_reservoir firmware (${{ steps.fw-env.outputs.env }})
        shell: bash
        run: |
          cd firmware/node_reservoir
          python -m platformio run -e ${{ steps.fw-env.outputs.env }}
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/${{ steps.fw-env.outputs.env }}/bootloader.bin \
            0x8000 .pio/build/${{ steps.fw-env.outputs.env }}/partitions.bin \
            0x10000 .pio/build/${{ steps.fw-env.outputs.env }}/firmware.bin

      - name: Build node_multiplexed_reservoir firmware (${{ steps.fw-env.outputs.env }})
        shell: bash
        run: |
          cd firmware/node_multiplexed_reservoir
          python -m platformio run -e ${{ steps.fw-env.outputs.env }}
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/${{ steps.fw-env.outputs.env }}/bootloader.bin \
            0x8000 .pio/build/${{ steps.fw-env.outputs.env }}/partitions.bin \
            0x10000 .pio/build/${{ steps.fw-env.outputs.env }}/firmware.bin

      - name: Collect firmware binaries
        shell: bash
        run: |
          mkdir -p firmware-binaries
          cp firmware/gateway/firmware.bin                    firmware-binaries/gateway.bin
          cp firmware/node_pump/firmware.bin                  firmware-binaries/node_pump.bin
          cp firmware/node_multiplexed_pump/firmware.bin      firmware-binaries/node_multiplexed_pump.bin
          cp firmware/node_reservoir/firmware.bin             firmware-binaries/node_reservoir.bin
          cp firmware/node_multiplexed_reservoir/firmware.bin firmware-binaries/node_multiplexed_reservoir.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.fw-env.outputs.env }}-windows
          path: firmware-binaries/
          retention-days: 30

      - name: Build with PyInstaller
        run: pyinstaller softedibo.spec

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path dist/SoftEdIBO/* -DestinationPath SoftEdIBO-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftEdIBO-windows-x64
          path: SoftEdIBO-windows-x64.zip
          retention-days: 30

  # -----------------------------------------------------------------------
  # Every push to master: creates/updates a rolling "nightly" pre-release.
  # Not triggered on tag pushes (release job handles those).
  # -----------------------------------------------------------------------
  nightly:
    needs: [build, build-windows]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-windows-x64

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-debug
          path: firmware-binaries/

      - name: Zip firmware binaries
        run: zip -j firmware-debug.zip firmware-binaries/*.bin

      - name: Create/update nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly"
          prerelease: true
          files: |
            SoftEdIBO-x86_64.AppImage
            SoftEdIBO-windows-x64.zip
            firmware-debug.zip
          body: |
            <!-- commit: ${{ github.sha }} -->
            Automatic build from the latest commit on `master`. Not a stable release.

            **Linux:** `chmod +x SoftEdIBO-x86_64.AppImage && ./SoftEdIBO-x86_64.AppImage`
            **Windows:** extract `SoftEdIBO-windows-x64.zip` and run `SoftEdIBO.exe`

            **Firmware** (`firmware-debug.zip`): debug builds for all node types.
            Flash with `esptool.py --chip esp32 write_flash 0x0 <node_type>.bin`.

  # -----------------------------------------------------------------------
  # Tags v*: creates a stable GitHub release (available via OTA).
  # -----------------------------------------------------------------------
  release:
    needs: [build, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-windows-x64

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-release
          path: firmware-binaries/

      - name: Zip firmware binaries
        run: zip -j firmware.zip firmware-binaries/*.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SoftEdIBO-x86_64.AppImage
            SoftEdIBO-windows-x64.zip
            firmware.zip
          generate_release_notes: true
          body: |
            ## Linux (x86-64)

            1. Download **`SoftEdIBO-x86_64.AppImage`**
            2. Make it executable (once):
               ```bash
               chmod +x SoftEdIBO-x86_64.AppImage
               ```
            3. **Double-click** — the setup wizard opens automatically.

            > **Serial port (USB):** if this is your first time, run:
            > `sudo usermod -aG dialout $USER`  and log out/in.

            Application data is stored in `~/.local/share/SoftEdIBO/`.

            ## Windows (x64)

            1. Download and extract **`SoftEdIBO-windows-x64.zip`**
            2. Run **`SoftEdIBO.exe`** — the setup wizard opens automatically.

            > **Serial port (USB):** install the CH340 or CP210x driver if your device isn't detected.

            Application data is stored in `%APPDATA%\SoftEdIBO\`.

            ## Firmware (`firmware.zip`)

            Flash the appropriate binary for each node type using:
            ```bash
            esptool.py --chip esp32 write_flash 0x0 <node_type>.bin
            ```

            | File | Node type | Description |
            |------|-----------|-------------|
            | `gateway.bin` | Gateway | USB–ESP-NOW bridge |
            | `node_pump.bin` | `node_pump` | 3-chamber node, direct GPIO valves, onboard pumps |
            | `node_multiplexed_pump.bin` | `node_multiplexed_pump` | N-chamber node, 74HC595 valves + 74HC4051 mux, onboard pumps |
            | `node_reservoir.bin` | `node_reservoir` | Single-tank reservoir, GPIO pumps |
            | `node_multiplexed_reservoir.bin` | `node_multiplexed_reservoir` | Multi-tank reservoir, shift-register pump relays + sensor mux |
