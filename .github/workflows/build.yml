name: Build

on:
  push:
    branches: [master, develop]
    tags:     ["v*"]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libfontconfig1 \
            imagemagick libfuse2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate Qt UI Python files
        run: |
          for ui_file in src/gui/ui/*.ui; do
            base=$(basename "$ui_file" .ui)
            pyside6-uic "$ui_file" -o "src/gui/ui_${base}.py"
          done

      - name: Inject version into src/_version.py
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            VERSION="nightly"
          else
            VERSION="dev"
          fi
          REPO="${GITHUB_REPOSITORY}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '__version__ = "%s"\nGITHUB_REPO = "%s"\n__build_time__ = "%s"\n' \
            "$VERSION" "$REPO" "$BUILD_TIME" > src/_version.py

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Build gateway firmware
        run: |
          cd firmware/gateway
          python -m platformio run
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      - name: Build air_chamber_node firmware
        run: |
          cd firmware/air_chamber_node
          python -m platformio run
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      - name: Build with PyInstaller
        run: pyinstaller softedibo.spec

      # ----------------------------------------------------------------
      # AppImage — single file, double-click to open
      # ----------------------------------------------------------------

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool-bin

      - name: Generate app icon
        run: |
          convert -size 256x256 gradient:'#1a5276-#2980b9' \
            -font DejaVu-Sans-Bold -pointsize 32 -fill white \
            -gravity Center -annotate 0 "SoftEdIBO" softedibo.png

      - name: Create AppDir
        run: |
          mkdir -p SoftEdIBO.AppDir
          cp -r dist/SoftEdIBO/. SoftEdIBO.AppDir/

          cat > SoftEdIBO.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          exec "$APPDIR/SoftEdIBO" "$@"
          APPRUN
          chmod +x SoftEdIBO.AppDir/AppRun

          cat > SoftEdIBO.AppDir/softedibo.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=SoftEdIBO
          Comment=Soft-based robot for inclusive education
          Exec=SoftEdIBO
          Icon=softedibo
          Terminal=false
          Type=Application
          Categories=Education;
          DESKTOP

          cp softedibo.png SoftEdIBO.AppDir/softedibo.png
          cp softedibo.png SoftEdIBO.AppDir/.DirIcon

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-bin/AppRun \
            SoftEdIBO.AppDir SoftEdIBO-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64
          path: SoftEdIBO-x86_64.AppImage
          retention-days: 30

  # -----------------------------------------------------------------------
  # Windows build — produces a portable zip
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate Qt UI Python files
        shell: bash
        run: |
          for ui_file in src/gui/ui/*.ui; do
            base=$(basename "$ui_file" .ui)
            pyside6-uic "$ui_file" -o "src/gui/ui_${base}.py"
          done

      - name: Inject version into src/_version.py
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            VERSION="nightly"
          else
            VERSION="dev"
          fi
          REPO="${GITHUB_REPOSITORY}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '__version__ = "%s"\nGITHUB_REPO = "%s"\n__build_time__ = "%s"\n' \
            "$VERSION" "$REPO" "$BUILD_TIME" > src/_version.py

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Cache PlatformIO toolchain
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Build gateway firmware
        shell: bash
        run: |
          cd firmware/gateway
          python -m platformio run
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      - name: Build air_chamber_node firmware
        shell: bash
        run: |
          cd firmware/air_chamber_node
          python -m platformio run
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware.bin \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      - name: Build with PyInstaller
        run: pyinstaller softedibo.spec

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path dist/SoftEdIBO/* -DestinationPath SoftEdIBO-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftEdIBO-windows-x64
          path: SoftEdIBO-windows-x64.zip
          retention-days: 30

  # -----------------------------------------------------------------------
  # develop branch: creates/updates a "nightly" pre-release on GitHub.
  # Allows OTA testing without touching master.
  # -----------------------------------------------------------------------
  nightly:
    needs: [build, build-windows]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-windows-x64

      - name: Create/update nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (develop)"
          prerelease: true
          files: |
            SoftEdIBO-x86_64.AppImage
            SoftEdIBO-windows-x64.zip
          body: |
            Automatic build from the `develop` branch. Not a stable release.

            **Linux:** `chmod +x SoftEdIBO-x86_64.AppImage && ./SoftEdIBO-x86_64.AppImage`
            **Windows:** extract `SoftEdIBO-windows-x64.zip` and run `SoftEdIBO.exe`

  # -----------------------------------------------------------------------
  # Tags v*: creates a stable GitHub release (available via OTA).
  # -----------------------------------------------------------------------
  release:
    needs: [build, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SoftEdIBO-x86_64.AppImage
            SoftEdIBO-windows-x64.zip
          generate_release_notes: true
          body: |
            ## Linux (x86-64)

            1. Download **`SoftEdIBO-x86_64.AppImage`**
            2. Make it executable (once):
               ```bash
               chmod +x SoftEdIBO-x86_64.AppImage
               ```
            3. **Double-click** — the setup wizard opens automatically.

            > **Serial port (USB):** if this is your first time, run:
            > `sudo usermod -aG dialout $USER`  and log out/in.

            Application data is stored in `~/.local/share/SoftEdIBO/`.

            ## Windows (x64)

            1. Download and extract **`SoftEdIBO-windows-x64.zip`**
            2. Run **`SoftEdIBO.exe`** — the setup wizard opens automatically.

            > **Serial port (USB):** install the CH340 or CP210x driver if your device isn't detected.

            Application data is stored in `%APPDATA%\SoftEdIBO\`.
