[env]
platform  = espressif32 @ ^6.0.0
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; NUM_CHAMBERS: number of chambers on this node (max 8 with a single 74HC4051 sensor mux).
; Adjust -DNUM_CHAMBERS=N to match the physical build.

; --- Production build (default: pio run) ---
[env:release]
build_flags = -O2 -DNDEBUG -DNUM_CHAMBERS=8

; --- Development build ---
[env:debug]
build_flags = -O0 -g -DDEBUG_BUILD -DNUM_CHAMBERS=8

; --- Production build — reservoir mode (no onboard pumps) ---
[env:release_res]
build_flags = -O2 -DNDEBUG -DNUM_CHAMBERS=8 -DRESERVOIR_MODE

; --- Development build — reservoir mode ---
[env:debug_res]
build_flags = -O0 -g -DDEBUG_BUILD -DNUM_CHAMBERS=8 -DRESERVOIR_MODE
