[env]
platform  = espressif32 @ ^6.0.0
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; --- Production build (default: pio run) ---
[env:release]
build_flags = -O2 -DNDEBUG

; --- Development build ---
[env:debug]
build_flags = -O0 -g -DDEBUG_BUILD

; --- Production build — reservoir mode (no onboard pumps) ---
[env:release_res]
build_flags = -O2 -DNDEBUG -DRESERVOIR_MODE

; --- Development build — reservoir mode ---
[env:debug_res]
build_flags = -O0 -g -DDEBUG_BUILD -DRESERVOIR_MODE
