[env]
platform  = espressif32 @ ^6.0.0
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; --- Production build ---
[env:release]
build_flags = -O2 -DNDEBUG

; --- Development build ---
[env:debug]
build_flags = -O0 -g -DDEBUG_BUILD
