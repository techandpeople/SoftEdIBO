[env]
platform  = espressif32 @ ^6.0.0
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; NUM_TANKS: number of independent tanks (pressure + vacuum) managed by this node.
; Each tank gets one inflate relay, one deflate relay, and one pressure sensor channel.
; Max 8 with a single 74HC4051 sensor mux. Default: 2 (one pressure + one vacuum tank).
; Adjust -DNUM_TANKS=N to match your build.

; --- Production build ---
[env:release]
build_flags = -O2 -DNDEBUG -DNUM_TANKS=2

; --- Development build ---
[env:debug]
build_flags = -O0 -g -DDEBUG_BUILD -DNUM_TANKS=2
